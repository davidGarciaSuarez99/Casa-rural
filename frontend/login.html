<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceder — La Casa Baju</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde:     #2d4a2d;
      --verde-med: #4a7c4a;
      --verde-cla: #8fbc8f;
      --crema:     #f5f0e8;
      --arena:     #e8dfc8;
      --blanco:    #fdfbf7;
      --texto:     #2a2a2a;
      --gris:      #888;
      --error:     #c0392b;
      --exito:     #27ae60;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--verde);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 110%, rgba(143,188,143,.18) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234a7c4a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .card {
      background: var(--blanco);
      border-radius: 4px;
      width: 100%;
      max-width: 460px;
      padding: 3rem;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 60px rgba(0,0,0,.3);
    }

    .card-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .card-logo a {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--verde);
      text-decoration: none;
    }
    .card-logo p {
      font-size: .78rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--gris);
      margin-top: .3rem;
    }

    /* TABS */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 2px solid var(--arena);
      margin-bottom: 2rem;
    }
    .tab {
      padding: .8rem;
      text-align: center;
      font-size: .82rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gris);
      cursor: pointer;
      transition: color .3s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tab.activo { color: var(--verde); border-bottom-color: var(--verde); font-weight: 500; }

    /* FORMULARIO */
    .form-panel { display: none; }
    .form-panel.activo { display: block; }

    .form-group {
      display: flex; flex-direction: column; gap: .4rem;
      margin-bottom: 1rem;
    }
    .form-group label {
      font-size: .72rem; letter-spacing: .15em;
      text-transform: uppercase; color: var(--gris);
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 1rem; top: 50%;
      transform: translateY(-50%); color: var(--gris); font-size: .9rem;
    }
    .form-group input {
      width: 100%;
      padding: .8rem 1rem .8rem 2.8rem;
      border: 1px solid var(--arena); border-radius: 2px;
      font-family: 'Jost', sans-serif; font-size: .9rem;
      background: var(--crema); color: var(--texto);
      transition: border-color .3s;
    }
    .form-group input:focus { outline: none; border-color: var(--verde-cla); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .btn-submit {
      width: 100%; background: var(--verde); color: #fff;
      padding: .9rem; border: none; border-radius: 2px;
      font-family: 'Jost', sans-serif; font-size: .88rem;
      font-weight: 500; letter-spacing: .15em; text-transform: uppercase;
      cursor: pointer; transition: background .3s; margin-top: .5rem;
    }
    .btn-submit:hover { background: var(--verde-med); }
    .btn-submit:disabled { background: var(--gris); cursor: not-allowed; }

    .form-msg {
      padding: .8rem 1rem; border-radius: 2px;
      font-size: .85rem; margin-top: 1rem; display: none;
      text-align: center;
    }
    .form-msg.exito { background: rgba(39,174,96,.1); color: var(--exito); border: 1px solid rgba(39,174,96,.2); }
    .form-msg.error { background: rgba(192,57,43,.1); color: var(--error); border: 1px solid rgba(192,57,43,.2); }

    .volver {
      display: block; text-align: center; margin-top: 1.5rem;
      font-size: .82rem; color: var(--gris); text-decoration: none;
      transition: color .3s;
    }
    .volver:hover { color: var(--verde); }

    @media (max-width: 500px) {
      .card { padding: 2rem 1.5rem; margin: 1rem; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-logo">
    <a href="index.html">La Casa Baju</a>
    <p>Área privada</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab activo" onclick="cambiarTab('login', this)">Iniciar sesión</div>
    <div class="tab" onclick="cambiarTab('registro', this)">Crear cuenta</div>
  </div>

  <!-- LOGIN -->
  <div class="form-panel activo" id="panel-login">
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="tu@email.com" />
      </div>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="••••••••"
               onkeydown="if(event.key==='Enter') hacerLogin()" />
      </div>
    </div>
    <button class="btn-submit" onclick="hacerLogin()" id="btnLogin">
      <i class="fas fa-sign-in-alt"></i> Iniciar sesión
    </button>
    <div class="form-msg" id="loginMsg"></div>
  </div>

  <!-- REGISTRO -->
  <div class="form-panel" id="panel-registro">
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre *</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="regNombre" placeholder="Tu nombre" />
        </div>
      </div>
      <div class="form-group">
        <label>Apellidos *</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="regApellidos" placeholder="Tus apellidos" />
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="regEmail" placeholder="tu@email.com" />
      </div>
    </div>
    <div class="form-group">
      <label>Teléfono</label>
      <div class="input-wrap">
        <i class="fas fa-phone"></i>
        <input type="tel" id="regTelefono" placeholder="+34 600 000 000" />
      </div>
    </div>
    <div class="form-group">
      <label>Contraseña *</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" />
      </div>
    </div>
    <button class="btn-submit" onclick="hacerRegistro()" id="btnRegistro">
      <i class="fas fa-user-plus"></i> Crear cuenta
    </button>
    <div class="form-msg" id="registroMsg"></div>
  </div>

  <a href="index.html" class="volver">
    <i class="fas fa-arrow-left"></i> Volver a la web
  </a>
</div>

<script>
const API = 'http://localhost:8080/api';

// ── Tabs ──
function cambiarTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('activo'));
  el.classList.add('activo');
  document.getElementById(`panel-${tab}`).classList.add('activo');
}

// ── Login ──
async function hacerLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const msg      = document.getElementById('loginMsg');
  const btn      = document.getElementById('btnLogin');

  if (!email || !password) {
    mostrarMsg(msg, 'error', 'Por favor rellena todos los campos.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      // Guardar token y datos del usuario en localStorage
      localStorage.setItem('token',    data.token);
      localStorage.setItem('userId',   data.id);
      localStorage.setItem('nombre',   data.nombre);
      localStorage.setItem('apellidos',data.apellidos);
      localStorage.setItem('email',    data.email);
      localStorage.setItem('rol',      data.rol);

      mostrarMsg(msg, 'exito', '¡Bienvenido! Redirigiendo...');

      // Redirigir según el rol
      setTimeout(() => {
        if (data.rol === 'ADMIN') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      }, 1000);

    } else {
      mostrarMsg(msg, 'error', data || 'Email o contraseña incorrectos.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar sesión';
    }
  } catch(e) {
    mostrarMsg(msg, 'error', 'No se pudo conectar con el servidor.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar sesión';
  }
}

// ── Registro ──
async function hacerRegistro() {
  const nombre    = document.getElementById('regNombre').value.trim();
  const apellidos = document.getElementById('regApellidos').value.trim();
  const email     = document.getElementById('regEmail').value.trim();
  const telefono  = document.getElementById('regTelefono').value.trim();
  const password  = document.getElementById('regPassword').value;
  const msg       = document.getElementById('registroMsg');
  const btn       = document.getElementById('btnRegistro');

  if (!nombre || !apellidos || !email || !password) {
    mostrarMsg(msg, 'error', 'Por favor rellena todos los campos obligatorios.');
    return;
  }
  if (password.length < 6) {
    mostrarMsg(msg, 'error', 'La contraseña debe tener al menos 6 caracteres.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando cuenta...';

  try {
    const res = await fetch(`${API}/auth/registro`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nombre, apellidos, email, telefono,
        passwordHash: password
      })
    });

    const data = await res.json();

    if (res.ok) {
      mostrarMsg(msg, 'exito', '¡Cuenta creada! Ahora puedes iniciar sesión.');
      setTimeout(() => cambiarTab('login', document.querySelector('.tab')), 1500);
    } else {
      mostrarMsg(msg, 'error', data || 'Error al crear la cuenta.');
    }
  } catch(e) {
    mostrarMsg(msg, 'error', 'No se pudo conectar con el servidor.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Crear cuenta';
  }
}

function mostrarMsg(el, tipo, texto) {
  el.className = `form-msg ${tipo}`;
  el.style.display = 'block';
  el.innerHTML = `<i class="fas fa-${tipo === 'exito' ? 'check-circle' : 'exclamation-circle'}"></i> ${texto}`;
}

// Si ya hay sesión iniciada, redirigir
if (localStorage.getItem('token')) {
  const rol = localStorage.getItem('rol');
  window.location.href = rol === 'ADMIN' ? 'admin.html' : 'index.html';
}
</script>
</body>
</html>
